<!-- index.html (Local Link Client) -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"
    />
    <title>Encore Link</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-color: #0a0a14;
        --bg-secondary: #141423;
        --primary: #89cff0;
        --secondary: #ffd700;
        --text: #ffffff;
        --text-dim: rgba(255, 255, 255, 0.6);
        --border: rgba(255, 255, 255, 0.15);
        --btn-bg: rgba(255, 255, 255, 0.05);
        --btn-active: rgba(137, 207, 240, 0.2);
        --radius: 12px;
        --header-height: 60px;
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.3);
      }
      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
      }

      body {
        font-family: "Rajdhani", sans-serif;
        background-color: var(--bg-color);
        color: var(--text);
        margin: 0;
        height: 100dvh; /* Dynamic viewport height fixes mobile keyboard cutoff */
        width: 100vw;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .app-container {
        display: flex;
        flex-direction: column;
        height: 100%;
        width: 100%;
        overflow: hidden;
        position: relative;
      }
      .app-header {
        height: var(--header-height);
        display: flex;
        align-items: center;
        justify-content: center;
        border-bottom: 1px solid var(--border);
        background: var(--bg-color);
        z-index: 10;
        flex-shrink: 0;
      }
      .app-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--primary);
        letter-spacing: 0.2rem;
        margin: 0;
        text-shadow: 0 0 10px rgba(137, 207, 240, 0.5);
      }
      .view-container {
        flex: 1;
        position: relative;
        overflow: hidden;
        width: 100%;
      }
      .view {
        position: absolute;
        inset: 0;
        background: var(--bg-color);
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      #remote-view {
        z-index: 1;
      }
      #songlist-view {
        z-index: 2;
        transform: translateX(100%);
        transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        visibility: hidden;
      }
      #songlist-view.active {
        transform: translateX(0);
        visibility: visible;
      }
      #search-view {
        z-index: 50;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        background: var(--bg-color);
        visibility: hidden;
      }
      #search-view.active {
        transform: translateY(0);
        visibility: visible;
      }

      /* --- Chat & Social UI --- */
      #chat-view {
        z-index: 40;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        visibility: hidden;
      }
      #chat-view.active {
        transform: translateY(0);
        visibility: visible;
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .chat-msg {
        background: var(--bg-secondary);
        padding: 0.75rem 1rem;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        word-wrap: break-word;
        max-width: 90%;
        align-self: flex-start;
      }
      .chat-msg .sender {
        font-weight: 700;
        color: var(--primary);
        font-size: 0.95rem;
        margin-bottom: 0.25rem;
      }
      .chat-msg.self {
        background: rgba(137, 207, 240, 0.1);
        border-color: rgba(137, 207, 240, 0.3);
        align-self: flex-end;
      }
      .chat-input-area {
        padding: 1rem;
        background: var(--bg-secondary);
        border-top: 1px solid var(--border);
        display: flex;
        gap: 0.5rem;
        flex-direction: column;
        flex-shrink: 0;
      }
      .chat-controls {
        display: flex;
        gap: 0.5rem;
      }
      .typing-indicator {
        font-size: 0.85rem;
        color: var(--secondary);
        height: 20px;
        font-style: italic;
      }

      #remote-view-content {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .remote-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.75rem;
        width: 100%;
        max-width: 400px;
        padding-bottom: 2rem;
      }
      .numpad-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.75rem;
        margin-bottom: 0.75rem;
      }
      .controls-wrapper {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        margin-bottom: 0.75rem;
      }
      .control-column {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      button {
        font-family: "Rajdhani", sans-serif;
        background: var(--btn-bg);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: var(--radius);
        cursor: pointer;
        font-weight: 700;
        font-size: 1.2rem;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s ease;
        user-select: none;
        height: 60px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        -webkit-tap-highlight-color: transparent;
      }
      button:active {
        transform: scale(0.96);
        background: var(--btn-active);
        border-color: var(--primary);
      }
      .btn-primary {
        background: var(--primary);
        color: var(--bg-color);
        border: none;
      }
      .btn-secondary {
        background: var(--secondary);
        color: var(--bg-color);
        border: none;
      }
      .btn-danger {
        color: #ff5555;
        border-color: rgba(255, 85, 85, 0.3);
      }
      .span-2 {
        grid-column: span 2;
      }
      .span-4 {
        grid-column: span 4;
      }
      .numpad-btn {
        font-size: 1.8rem;
        height: 70px;
        background: rgba(255, 255, 255, 0.02);
      }
      .library-header {
        padding: 0.75rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 0.5rem;
        background: var(--bg-secondary);
        flex-shrink: 0;
      }
      .search-bar {
        flex: 1;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: white;
        padding: 0.5rem 1rem;
        font-family: "Rajdhani";
        font-size: 1.1rem;
        outline: none;
      }
      .search-bar:focus {
        border-color: var(--primary);
      }
      .library-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* --- Virtual Scroller Classes --- */
      .virtual-scroller {
        position: relative;
        overflow-y: auto;
        width: 100%;
        height: 100%;
        -webkit-overflow-scrolling: touch;
      }
      .virtual-scroller-content {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
      }

      #artist-view-container {
        flex: 1;
        display: block;
      }
      .artist-row {
        display: flex;
        align-items: center;
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border);
        padding: 0.8rem;
        cursor: pointer;
        transition: background 0.2s;
        height: 75px;
        box-sizing: border-box;
      }
      .artist-row:active {
        background: var(--btn-active);
      }
      .artist-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 1.2rem;
        color: rgba(255, 255, 255, 0.9);
        margin-right: 1rem;
        flex-shrink: 0;
      }
      .artist-name-list {
        font-size: 1.1rem;
        font-weight: 600;
        color: white;
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .artist-count {
        font-size: 0.9rem;
        color: var(--text-dim);
      }
      #song-view-container {
        display: none;
        flex-direction: column;
        height: 100%;
      }
      #song-view-container.active {
        display: flex;
      }
      .song-item {
        display: flex;
        align-items: center;
        padding: 1rem 0.5rem;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        height: 75px;
        box-sizing: border-box;
      }
      .song-item:active {
        background: var(--btn-active);
      }
      .song-code {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--primary);
        width: 60px;
        flex-shrink: 0;
      }
      .song-info {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .song-title {
        font-size: 1.1rem;
        font-weight: 700;
        margin-bottom: 2px;
      }
      .toast {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translate(-50%, 100px);
        background: rgba(20, 20, 30, 0.95);
        border: 1px solid var(--primary);
        color: #fff;
        padding: 12px 24px;
        border-radius: 50px;
        font-weight: 700;
        opacity: 0;
        transition: all 0.3s;
        z-index: 9999;
      }
      .toast.show {
        transform: translate(-50%, 0);
        opacity: 1;
      }

      /* Custom Modal */
      #nickname-overlay {
        position: fixed;
        inset: 0;
        background: rgba(10, 10, 20, 0.95);
        z-index: 99999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 2rem;
        visibility: hidden;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      #nickname-overlay.active {
        visibility: visible;
        opacity: 1;
      }
      .nickname-box {
        background: var(--bg-secondary);
        border: 1px solid var(--primary);
        padding: 2rem;
        border-radius: var(--radius);
        width: 100%;
        max-width: 400px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      @media (min-width: 768px) {
        .view-container {
          display: flex;
          flex-direction: row;
          width: 100%;
          height: 100%;
        }
        .app-header {
          display: none;
        }
        #remote-view {
          position: relative;
          width: 380px;
          flex-shrink: 0;
          border-right: 1px solid var(--border);
          transform: none;
          display: flex;
          z-index: 10;
        }
        .remote-title-desktop {
          display: block;
          text-align: center;
          font-size: 2.5rem;
          color: var(--primary);
          font-weight: 800;
          margin-bottom: 2rem;
          letter-spacing: 0.3rem;
          width: 100%;
        }
        #songlist-view {
          position: relative;
          flex: 1;
          transform: none !important;
          visibility: visible !important;
          display: flex;
          z-index: 5;
          border-left: none;
        }
        .mobile-only {
          display: none !important;
        }
        #unified-back-btn {
          display: none;
        }
        #unified-back-btn.desktop-visible {
          display: block;
        }
        button {
          font-size: 1.3rem;
          height: 70px;
        }
        .numpad-btn {
          height: 80px;
          font-size: 2.2rem;
        }
      }
      @media (max-width: 767px) {
        .remote-title-desktop {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- Nickname Input Modal -->
    <div id="nickname-overlay">
      <div class="nickname-box">
        <h2 style="margin-top: 0; color: var(--primary); letter-spacing: 2px">

        </h2>
        <p
          style="
            color: var(--text-dim);
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
          "

          Enter a nickname to join the chat and send cheers!
        </p>
        <input
          type="text"
          id="nickname-input"
          class="search-bar"
          placeholder="Your Nickname..."
          maxlength="15"
          style="
            width: 100%;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 1.3rem;
            padding: 1rem;
          "
        />
        <button
          id="nickname-submit"
          class="btn-primary"
          style="width: 100%; height: 60px; font-size: 1.2rem"
        >
          JOIN SESSION
        </button>
      </div>
    </div>

    <div class="app-container">
      <header class="app-header">
        <h1>ENCORE LINK</h1>
      </header>

      <div class="view-container">
        <!-- Remote Control Panel -->
        <div id="remote-view" class="view">
          <div id="remote-view-content">

          <div class="library-content">

                &uarr;

              <button
                data-type="nav_down"

                style="height: 80px; font-size: 2.5rem"

                &darr;

              data-type="enter"
              data-value="Enter"
              class="btn-primary"

                height: 100px;

    <div class="toast" id="toast">Song Reserved!</div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      // --- Virtual Scroller Utility ---
      class VirtualScroller {
        constructor(containerId, contentId, itemHeight, renderCallback) {
          this.container = document.getElementById(containerId);
          this.content = document.getElementById(contentId);
          this.itemHeight = itemHeight;
          this.renderCallback = renderCallback;
          this.items = [];
          this.container.addEventListener("scroll", () => this.render());
        }
        setItems(items) {
          this.items = items;
          this.content.style.height = `${this.items.length * this.itemHeight}px`;
          this.container.scrollTop = 0;
          this.render();
        }
        render() {
          const scrollTop = this.container.scrollTop;
          const containerHeight = this.container.clientHeight;
          let startIndex = Math.floor(scrollTop / this.itemHeight) - 5;
          let endIndex =
            Math.ceil((scrollTop + containerHeight) / this.itemHeight) + 5;
          startIndex = Math.max(0, startIndex);
          endIndex = Math.min(this.items.length, endIndex);
          this.content.innerHTML = "";
          const fragment = document.createDocumentFragment();
          for (let i = startIndex; i < endIndex; i++) {
            const node = this.renderCallback(this.items[i], i);
            node.style.position = "absolute";
            node.style.top = `${i * this.itemHeight}px`;
            node.style.width = "100%";
            node.style.height = `${this.itemHeight}px`;
            fragment.appendChild(node);
          }
          this.content.appendChild(fragment);
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        const socket = io({ query: { clientType: "remote" } });

        // --- State ---
        let fullSongList = [];
        let artistsMap = {};
        let currentArtistSongs = [];
        let navState = { view: "artists", mobileLibraryOpen: false };

        // --- Social State & Device ID ---
        function getOrCreateDeviceId() {
          let id = localStorage.getItem("encore_device_id");
          if (!id) {
            id =
              (crypto.randomUUID && crypto.randomUUID()) ||
              "dev_" + Math.random().toString(36).substring(2, 15);
            localStorage.setItem("encore_device_id", id);
          }
          return id;
        }

        const deviceId = getOrCreateDeviceId();
        let myNickname = localStorage.getItem("encore_nickname") || "";
        let chatMessages = [];
        let typingTimeout = null;

        // --- Elements ---
        const artistViewContainer = document.getElementById(
          "artist-view-container",
        );
        const songViewContainer = document.getElementById(
          "song-view-container",
        );
        const currentArtistLabel = document.getElementById(
          "current-artist-name",
        );
        const librarySearch = document.getElementById("library-search");
        const unifiedBackBtn = document.getElementById("unified-back-btn");
        const songlistView = document.getElementById("songlist-view");
        const searchView = document.getElementById("search-view");

        const chatView = document.getElementById("chat-view");
        const chatInput = document.getElementById("chat-input");
        const typingIndicator = document.getElementById("typing-indicator");
        const chatContainer = document.getElementById(
          "chat-messages-container",
        );

        const nickOverlay = document.getElementById("nickname-overlay");
        const nickInput = document.getElementById("nickname-input");
        const nickSubmit = document.getElementById("nickname-submit");

        // --- Virtual Scroller Setups ---
        const artistScroller = new VirtualScroller(
          "artist-view-container",
          "artist-list",
          75,
          (artist) => {
            const row = document.createElement("div");
            row.className = "artist-row";
            const color1 = stringToColor(artist);
            const color2 = stringToColor(artist.split("").reverse().join(""));
            const count = artistsMap[artist] ? artistsMap[artist].length : 0;
            row.innerHTML = `<div class="artist-avatar" style="background: linear-gradient(135deg, ${color1}, ${color2})">${artist.charAt(0).toUpperCase()}</div><div class="artist-name-list">${artist}</div><div class="artist-count">${count}</div>`;
            row.onclick = () => openArtistSongs(artist);
            return row;
          },
        );

        const songScroller = new VirtualScroller(
          "song-scroller-container",
          "artist-songs-list",
          75,
          (song) => {
            const item = document.createElement("div");
            item.className = "song-item";
            item.innerHTML = `<div class="song-code">${song.code}</div><div class="song-info"><div class="song-title">${song.title}</div></div>`;
            item.onclick = () => reserveSong(song);
            return item;
          },
        );

        // --- Socket Events ---
        socket.on("connect", () => {
          console.log("Connected to Encore. Requesting song list...");
          socket.emit("remote-command", { type: "get_song_list", value: "" });

          if (!myNickname) {
            nickOverlay.classList.add("active");
            nickInput.focus();
          } else {
            socket.emit("remote-command", {
              type: "set_nickname",
              value: myNickname,
              deviceId,
            });
          }
        });

        nickSubmit.onclick = () => {
          const val = nickInput.value.trim();
          if (val) {
            myNickname = val;
            localStorage.setItem("encore_nickname", myNickname);
            nickOverlay.classList.remove("active");
            socket.emit("remote-command", {
              type: "set_nickname",
              value: myNickname,
              deviceId,
            });
          }
        };

        nickInput.addEventListener("keyup", (e) => {
          if (e.key === "Enter") nickSubmit.onclick();
        });

        socket.on("fromRemote", (payload) => {
          if (payload.type === "songlist" && Array.isArray(payload.contents)) {
            fullSongList = payload.contents;
            processSongList(fullSongList);
          }
          if (payload.type === "reserve_response") {
            if (payload.success) showToast(`Reserved: ${payload.song.title}`);
            else showToast(`Song not found.`);
          }

          // Social Events
          if (payload.type === "social_init") {
            myNickname = payload.nickname;
            localStorage.setItem("encore_nickname", myNickname);
            chatMessages = payload.history || [];
            renderChat();
          }
          if (payload.type === "social_update") {
            document.getElementById("user-count").textContent =
              `${payload.usersCount} User(s)`;
            const typers = payload.typing.filter((n) => n !== myNickname);
            if (typers.length === 0) typingIndicator.textContent = "";
            else if (typers.length === 1)
              typingIndicator.textContent = `${typers[0]} is typing...`;
            else typingIndicator.textContent = `Several people are typing...`;
          }
          if (payload.type === "new_chat") {
            chatMessages.push(payload.message);
            if (chatMessages.length > 100) chatMessages.shift();
            renderChat();
          }
        });

        // --- Chat Logic ---
        function renderChat() {
          const isNearBottom =
            chatContainer.scrollHeight -
              chatContainer.scrollTop -
              chatContainer.clientHeight <
            100;
          chatContainer.innerHTML = "";
          chatMessages.forEach((msg) => {
            const isSelf = msg.sender === myNickname;
            const div = document.createElement("div");
            div.className = `chat-msg ${isSelf ? "self" : ""}`;
            div.innerHTML = `<div class="sender">${isSelf ? "You" : msg.sender}</div><div class="text">${msg.text}</div>`;
            chatContainer.appendChild(div);
          });
          if (isNearBottom || chatMessages.length === 1)
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        document.getElementById("open-chat-btn").onclick = () => {
          chatView.classList.add("active");
          setTimeout(
            () => (chatContainer.scrollTop = chatContainer.scrollHeight),
            50,
          );
        };
        document.getElementById("close-chat-btn").onclick = () =>
          chatView.classList.remove("active");

        const sendChatMessage = () => {
          const val = chatInput.value.trim();
          if (!val) return;
          socket.emit("remote-command", { type: "chat_message", value: val });
          chatInput.value = "";
          socket.emit("remote-command", { type: "typing_state", value: false });
        };
        const sendCheer = () => {
          const val = chatInput.value.trim();
          if (!val) return showToast("Type a message to Cheer!");
          socket.emit("remote-command", { type: "send_cheer", value: val });
          chatInput.value = "";
          showToast("Cheer Sent!");
        };

        document.getElementById("chat-send-btn").onclick = sendChatMessage;
        document.getElementById("chat-cheer-btn").onclick = sendCheer;

        chatInput.addEventListener("keyup", (e) => {
          if (e.key === "Enter") return sendChatMessage();
          socket.emit("remote-command", { type: "typing_state", value: true });
          clearTimeout(typingTimeout);
          typingTimeout = setTimeout(() => {
            socket.emit("remote-command", {
              type: "typing_state",
              value: false,
            });
          }, 2000);
        });

        // --- Library Logic ---
        function processSongList(songs) {
          artistsMap = {};
          songs.forEach((song) => {
            const rawArtist = song.artist || "Unknown Artist";
            const artistKey = rawArtist.trim();
            if (!artistsMap[artistKey]) artistsMap[artistKey] = [];
            artistsMap[artistKey].push(song);
          });
          const sortedArtists = Object.keys(artistsMap).sort((a, b) =>
            a.localeCompare(b, undefined, { sensitivity: "base" }),
          );
          renderArtistList(sortedArtists);
        }

        function renderArtistList(artists) {
          if (artists.length === 0)
            document.getElementById("artist-list").innerHTML =
              '<div style="text-align: center; color: var(--text-dim); padding: 2rem;">No matches found.</div>';
          else artistScroller.setItems(artists);
        }

        function openArtistSongs(artistName) {
          navState.view = "songs";
          currentArtistLabel.textContent = artistName;
          currentArtistSongs = artistsMap[artistName] || [];
          artistViewContainer.style.display = "none";
          songViewContainer.classList.add("active");
          songScroller.setItems(currentArtistSongs);
          librarySearch.value = "";
          librarySearch.placeholder = `Search in ${artistName}...`;
          unifiedBackBtn.classList.add("desktop-visible");
        }

        function handleBackNavigation() {
          if (navState.view === "songs") {
            navState.view = "artists";
            artistViewContainer.style.display = "block";
            songViewContainer.classList.remove("active");
            librarySearch.placeholder = "Search songs or artists...";
            librarySearch.value = "";
            const sortedArtists = Object.keys(artistsMap).sort((a, b) =>
              a.localeCompare(b, undefined, { sensitivity: "base" }),
            );
            renderArtistList(sortedArtists);
            unifiedBackBtn.classList.remove("desktop-visible");
          } else if (navState.view === "artists") {
            if (window.innerWidth < 768) closeLibrary();
            else {
              librarySearch.value = "";
              const sorted = Object.keys(artistsMap).sort((a, b) =>
                a.localeCompare(b, undefined, { sensitivity: "base" }),
              );
              renderArtistList(sorted);
            }
          }
        }

        function openLibrary() {
          navState.mobileLibraryOpen = true;
          songlistView.classList.add("active");
        }
        function closeLibrary() {
          navState.mobileLibraryOpen = false;
          songlistView.classList.remove("active");
          if (navState.view === "songs") handleBackNavigation();
        }

        unifiedBackBtn.onclick = handleBackNavigation;
        document.getElementById("open-library-btn").onclick = openLibrary;

        document.querySelector('button[data-type="yt_search"]').onclick =
          () => {
            searchView.classList.add("active");
            document.getElementById("yt-input").focus();
            socket.emit("remote-command", { type: "yt_search_open" });
          };
        document.getElementById("close-yt-btn").onclick = () => {
          searchView.classList.remove("active");
          socket.emit("remote-command", { type: "yt_search_close" });
        };

        librarySearch.addEventListener("input", (e) => {
          const query = e.target.value.toLowerCase();
          if (navState.view === "artists") {
            const allArtists = Object.keys(artistsMap);
            if (!query) {
              renderArtistList(
                allArtists.sort((a, b) =>
                  a.localeCompare(b, undefined, { sensitivity: "base" }),
                ),
              );
            } else {
              const matchedArtists = new Set();
              allArtists.forEach((artist) => {
                if (artist.toLowerCase().includes(query))
                  matchedArtists.add(artist);
              });
              fullSongList.forEach((song) => {
                if (song.title && song.title.toLowerCase().includes(query)) {
                  const artistKey = song.artist.trim();
                  if (artistsMap[artistKey]) matchedArtists.add(artistKey);
                }
              });
              const results = Array.from(matchedArtists).sort((a, b) =>
                a.localeCompare(b, undefined, { sensitivity: "base" }),
              );
              renderArtistList(results);
            }
          } else {
            const filtered = currentArtistSongs.filter(
              (song) =>
                song.title.toLowerCase().includes(query) ||
                song.code.includes(query),
            );
            songScroller.setItems(filtered);
          }
        });

        function reserveSong(song) {
          socket.emit("remote-command", {
            type: "reserve_code",
            value: song.code,
          });
          showToast(`Reserved: ${song.title}`);
        }

        document.querySelectorAll("button[data-type]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const type = btn.dataset.type;
            const value = btn.dataset.value;
            if (type === "yt_search" && !btn.classList.contains("mobile-only"))
              return;
            socket.emit("remote-command", { type, value });
          });
        });

        document.getElementById("yt-submit-btn").onclick = () => {
          const query = document.getElementById("yt-input").value;
          if (query)
            socket.emit("remote-command", {
              type: "yt_search_query",
              value: query,
            });
        };

        function stringToColor(str) {
          let hash = 0;
          for (let i = 0; i < str.length; i++)
            hash = str.charCodeAt(i) + ((hash << 5) - hash);
          const c = (hash & 0x00ffffff).toString(16).toUpperCase();
          return "#" + "00000".substring(0, 6 - c.length) + c;
        }

        let toastTimeout;
        function showToast(msg) {
          const toast = document.getElementById("toast");
          toast.textContent = msg;
          toast.classList.add("show");
          clearTimeout(toastTimeout);
          toastTimeout = setTimeout(() => toast.classList.remove("show"), 2500);
        }
      });
    </script>
  </body>
</html>
